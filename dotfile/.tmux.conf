set-option -g base-index 1

bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key K kill-session

# 实用快捷键
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind n new-window -c "#{pane_current_path}"
set-option -g mouse on

# 鼠标拖动选择后自动复制到系统剪贴板，并退出复制模式
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# 双击选中后自动复制到系统剪贴板，并退出复制模式
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X copy-pipe-and-cancel "pbcopy"

# custom
set-option -g default-shell /bin/zsh
set-option -sg escape-time 10
set-option -g default-terminal "tmux-256color"
set-option -g status-right "%H:%M %d-%b-%y"
